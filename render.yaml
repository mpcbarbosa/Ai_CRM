services:
  - type: web
    name: ai-crm-api
    env: node
    region: frankfurt
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate --schema=../../prisma/schema.prisma && npm run build
    startCommand: npx prisma migrate deploy --schema=../../prisma/schema.prisma && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-crm-db
          property: connectionString
      - key: MQL_THRESHOLD
        value: "70"
      - key: SQL_THRESHOLD
        value: "100"
      - key: API_SECRET_KEY
        generateValue: true

  - type: web
    name: ai-crm-web
    env: node
    region: frankfurt
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # IMPORTANT: keep this as a literal value. Previously this used
      # `fromService.property: host` against `name: ai-crm-api`, but the
      # live service is `ai-crm-api-pcdn` (renamed outside the IaC). The
      # `property: host` was resolving to just "ai-crm-api-pcdn" — the bare
      # service name without `.onrender.com` and without a scheme — which
      # is not a usable URL. The browser ended up treating
      # `fetch('ai-crm-api-pcdn/api/leads')` as a path relative to the web
      # origin and every request returned 404. The Render dashboard env
      # var on ai-crm-web-pcdn was set manually to the value below to fix
      # production; this commit aligns the IaC with what's already live.
      # If the API service is ever renamed, update this literal too.
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-crm-api-pcdn.onrender.com

databases:
  - name: ai-crm-db
    plan: free
    region: frankfurt
